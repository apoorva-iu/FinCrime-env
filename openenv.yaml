name: fincrime-env
version: "1.0.0"
description: >
  AI Financial Crime Investigation Environment. An agent investigates
  financial fraud cases — spotting suspicious transactions, tracing
  money laundering networks, and delivering legal verdicts with evidence
  and reasoning.
author: FinCrimeEnv
tags:
  - openenv
  - finance
  - fraud-detection
  - money-laundering
  - real-world
  - investigation

tasks:
  - id: task1
    name: Spot the Fraud
    difficulty: easy
    description: >
      Analyze bank transactions and flag suspicious ones.
      Score = F1(flagged_transactions) * 0.8 + risk_level_accuracy * 0.2
    max_steps: 5
    reward_range: [0.0, 1.0]
    action_type: flag_transactions

  - id: task2
    name: Trace the Network
    difficulty: medium
    description: >
      Identify shell accounts, source, and beneficiary in a laundering chain.
      Score = shell_f1*0.4 + source_correct*0.3 + beneficiary_correct*0.3
    max_steps: 5
    reward_range: [0.0, 1.0]
    action_type: identify_network

  - id: task3
    name: Deliver the Verdict
    difficulty: hard
    description: >
      Multi-step investigation of transactions, emails, and documents.
      Score = verdict*0.4 + crimes*0.25 + evidence*0.25 + reasoning*0.1
    max_steps: 5
    reward_range: [0.0, 1.0]
    action_types: [investigate, deliver_verdict]

observation_space:
  type: object
  properties:
    case_id: { type: string }
    task_id: { type: string }
    description: { type: string }
    step: { type: integer }
    max_steps: { type: integer }
    instruction: { type: string }
    transactions: { type: array }
    accounts: { type: array }
    emails: { type: array }
    supporting_docs: { type: array }

action_space:
  flag_transactions:
    type: { type: string, const: "flag_transactions" }
    tx_ids: { type: array, items: { type: string } }
    risk_level: { type: string, enum: ["low", "medium", "high", "critical"] }
  identify_network:
    type: { type: string, const: "identify_network" }
    shell_accounts: { type: array, items: { type: string } }
    source: { type: string }
    beneficiary: { type: string }
  investigate:
    type: { type: string, const: "investigate" }
    notes: { type: string }
  deliver_verdict:
    type: { type: string, const: "deliver_verdict" }
    verdict:
      {
        type: string,
        enum: ["freeze_and_escalate", "request_info", "clear_suspect"],
      }
    crimes: { type: array, items: { type: string } }
    evidence: { type: array, items: { type: string } }
    reasoning: { type: string }

reward:
  type: shaped
  description: Milestone-based rewards with escalating loop penalties.
  range: [-1.0, 1.0]

server:
  host: "0.0.0.0"
  port: 7860
  framework: fastapi
  entrypoint: "main:app"
